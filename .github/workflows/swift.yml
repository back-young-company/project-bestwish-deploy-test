# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode 16.4
        uses: actions/setup-xcode@v1 # v1 또는 최신 버전을 사용
        with:
          # 로컬 Xcode 버전인 16.4를 정확히 지정
          # GitHub Actions에서 사용 가능한 버전 목록은 공식 문서 참고
          # https://github.com/actions/setup-xcode/blob/main/README.md#supported-xcode-versions
          xcode-version: '16.4' 

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild clean test \
            -project BestWish.xcodeproj \
            -scheme BestWish \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=15.4'
