name: iOS CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Run Tests
        run: |
          # xcodebuild build \
          #   -project BestWish.xcodeproj \
          #   -scheme BestWish \
          #   -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.4'
                 pod install --repo-update --clean-install --project-directory=BestWish/
          xcodebuild clean test -workspace BestWish/BestWish.xcworkspace \
          -scheme BestWish \
          -destination 'platform=iOS Simulator,name=iPhone 11 Pro,OS=latest'
