name: iOS CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: macos-14 # Xcode 16.x 지원되는 macOS 환경

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Set up Ruby (for Bundler/Fastlane if needed)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1 # 필요 시 조정

      - name: Install dependencies
        run: |
          brew install xcbeautify || true
          gem install bundler
          bundle install || true

      - name: Run unit tests
        run: |
          xcodebuild clean test \
            -project BestWish.xcodeproj \
            -scheme BestWish \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=16.4' \
          | xcbeautify
