name: Swift

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: macos-latest  # 최신 macOS 러너 사용
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode 16.4
        uses: actions/setup-xcode@v2 # ✨ 이곳을 v2로 변경합니다!
        with:
          # 로컬 Xcode 버전인 16.4를 정확히 지정
          # GitHub Actions에서 사용 가능한 Xcode 버전 목록은
          # setup-xcode 액션의 README 파일을 참고하세요:
          # https://github.com/actions/setup-xcode/blob/main/README.md#supported-xcode-versions
          xcode-version: '16.4' 

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild clean test \
            -project BestWish.xcodeproj \
            -scheme BestWish \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=15.4'
