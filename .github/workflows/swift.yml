name: Swift

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode 16.4
        # ✨ 여기를 전체 커밋 SHA로 변경합니다!
        uses: actions/setup-xcode@4d436a99268383c27076a5e11b15132227d86f78 
        with:
          xcode-version: '16.4' 

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Run tests
        run: |
          xcodebuild clean test \
            -project BestWish.xcodeproj \
            -scheme BestWish \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=15.4'
