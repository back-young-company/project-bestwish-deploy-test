# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift
# .github/workflows/deploy.yml
name: deploy

on:
  push:
    # release-v1.0.0, release/1.1.0 등 모든 “release-” 패턴을 트리거
    branches: [ "release-*", "release/**" ]

jobs:
  deploy:
    runs-on: macos-latest

    env:
      # ----------------- Xcode -----------------
      XC_PROJECT:  BestWish.xcodeproj
      XC_SCHEME:   BestWish
      XC_ARCHIVE:  BestWish.xcarchive

      # --------------- keychain ---------------
      KEYCHAIN:           bestwish.keychain
      KEYCHAIN_PASSWORD:  ""          # 빈 비밀번호(임시 키체인)

      # --------------- certificate (.p12) ---------------
      ENC_CERT: .github/secrets/bestwishCertification.p12.gpg
      DEC_CERT: .github/secrets/bestwishCertification.p12
      CERT_DECRYPT_KEY:  ${{ secrets.CERTS_ENCRYPTION_PWD }}   # gpg 암호
      CERT_EXPORT_PWD:   ${{ secrets.CERT_EXPORT_PWD }}        # p12 내보내기 암호
      
      # --------------- provisioning profiles ---------------
      # (1) 메인 앱
      ENC_PROV_MAIN: .github/secrets/BestWish_GitHub_Actions.mobileprovision.gpg
      DEC_PROV_MAIN: .github/secrets/BestWish_GitHub_Actions.mobileprovision
      # (2) ShareExtension
      ENC_PROV_EXT:  .github/secrets/BestWish_GitHub_Actions_Extension.mobileprovision.gpg
      DEC_PROV_EXT:  .github/secrets/BestWish_GitHub_Actions_Extension.mobileprovision
      PROV_DECRYPT_KEY: ${{ secrets.PROVISION_ENCRYPTION_PWD }} # gpg 암호

    steps:
    # ----------------------------------------------------------
    # 0. 소스 체크아웃 & Xcode 16.2 셋업
    # ----------------------------------------------------------
    - uses: actions/checkout@v4

    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    # ----------------------------------------------------------
    # 1. 임시 키체인 생성 & 기본 키체인으로 지정
    # ----------------------------------------------------------
    - name: Configure keychain
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
        security list-keychains -s "$KEYCHAIN"
        security default-keychain -s "$KEYCHAIN"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
        security set-keychain-settings

    # ----------------------------------------------------------
    # 2. 인증서 + 프로비저닝 두 개 복호화 & 설치
    # ----------------------------------------------------------
    - name: Decrypt and install code-signing assets
      run: |
        # ------- 인증서(.p12) -------
        gpg --quiet --batch --yes --decrypt \
            --passphrase "$CERT_DECRYPT_KEY" \
            --output "$DEC_CERT" "$ENC_CERT"

        security import "$DEC_CERT" \
            -k "$KEYCHAIN" \
            -P "$CERT_EXPORT_PWD" \
            -A

        # 작성 권한 부여 (codesign 시 keychain 접근)
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

        # ------- 프로비저닝(.mobileprovision) 두 개 -------
        for ENC in "$ENC_PROV_MAIN" "$ENC_PROV_EXT"; do
          OUT=${ENC%.gpg}
          gpg --quiet --batch --yes --decrypt \
              --passphrase "$PROV_DECRYPT_KEY" \
              --output "$OUT" "$ENC"
        done

        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        for PROV in "$DEC_PROV_MAIN" "$DEC_PROV_EXT"; do
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin \
                   <<< "$(security cms -D -i "$PROV")")
          cp "$PROV" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
        done

    # ----------------------------------------------------------
    # 3. 아카이브(Release 구성 사용)
    # ----------------------------------------------------------
    - name: Archive app
      run: |
        xcodebuild \
          -project "$XC_PROJECT" \
          -scheme  "$XC_SCHEME" \
          -configuration Release \
          -archivePath "$XC_ARCHIVE" \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=3BLN747VAP \
          clean archive | xcbeautify

    # ----------------------------------------------------------
    # 4. ipa 내보내기 (ExportOptions.plist 는 저장소에 포함돼 있다고 가정)
    # ----------------------------------------------------------
    - name: Export .ipa
      run: |
        xcodebuild -exportArchive \
          -archivePath "$XC_ARCHIVE" \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath . \
          -allowProvisioningUpdates

    # ----------------------------------------------------------
    # 5. TestFlight 업로드
    # ----------------------------------------------------------
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: 'BestWish.ipa'
        issuer-id:      ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id:     ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
